# """
# File: run_comprehensive_rag_eval.sh
# Shell script to run complete RAG evaluation
# """

#!/bin/bash
set -e

echo "[INFO] Starting comprehensive RAG evaluation..."

# Step 1: Run RAGas quality evaluation
echo "[INFO] Step 1: Running RAGas quality evaluation..."
python rag_quality_eval.py

# Step 2: Run Promptfoo security evaluation
echo "[INFO] Step 2: Running Promptfoo RAG security evaluation..."
promptfoo eval \
    --config rag_security_promptfooconfig.yaml \
    --output rag_security_results.json

# Step 3: Aggregate results
echo "[INFO] Step 3: Aggregating results..."
python aggregate_rag_results.py

echo "[INFO] Comprehensive RAG evaluation complete!"
echo "[INFO] Review rag_comprehensive_report.json for details"

