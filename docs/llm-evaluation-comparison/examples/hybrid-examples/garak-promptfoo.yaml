# Garak + Promptfoo Hybrid Integration
# This file demonstrates combining Garak and Promptfoo for comprehensive security testing

# =============================================================================
# OVERVIEW
# =============================================================================
#
# This hybrid approach combines:
# - Garak: Known vulnerability patterns (static probe library)
# - Promptfoo: Application-specific attacks (dynamic generation)
#
# Workflow:
# 1. Run Garak for baseline security assessment
# 2. Run Promptfoo for application-specific red teaming
# 3. Cross-reference findings for comprehensive security view

# =============================================================================
# PART 1: Garak Baseline Security Scan
# =============================================================================

# """
# File: garak_baseline_scan.py
# Run Garak baseline security scan
# """

import subprocess
import json
from datetime import datetime
from pathlib import Path

def run_garak_scan(
    model_type: str,
    model_name: str,
    probes: str,
    output_prefix: str
) -> str:
    """Run Garak security scan"""

    print(f"[INFO] Running Garak baseline scan on {model_name}...")
    print(f"[INFO] Probes: {probes}")

    # Build command
    command = [
        "python", "-m", "garak",
        "--model_type", model_type,
        "--model_name", model_name,
        "--probes", probes,
        "--report_prefix", output_prefix
    ]

    # Run scan
    result = subprocess.run(
        command,
        capture_output=True,
        text=True
    )

    if result.returncode != 0:
        print(f"[WARN] Garak scan completed with errors")
        print(result.stderr)

    print(f"[INFO] Garak scan complete. Results in {output_prefix}.jsonl")
    return f"{output_prefix}.jsonl"

def parse_garak_results(jsonl_file: str) -> dict:
    """Parse Garak JSONL results"""

    results = {
        "total_tests": 0,
        "passed_tests": 0,
        "failed_tests": 0,
        "probe_results": {},
        "vulnerabilities": []
    }

    with open(jsonl_file) as f:
        for line in f:
            entry = json.loads(line.strip())

            if entry.get("status") == "complete":
                probe_name = entry.get("probe", "unknown")
                detector_name = entry.get("detector", "unknown")
                passed = entry.get("passed", True)

                results["total_tests"] += 1

                if passed:
                    results["passed_tests"] += 1
                else:
                    results["failed_tests"] += 1
                    results["vulnerabilities"].append({
                        "probe": probe_name,
                        "detector": detector_name,
                        "severity": "high" if "dan" in probe_name.lower() else "medium"
                    })

                # Track by probe
                probe_key = f"{probe_name}.{detector_name}"
                if probe_key not in results["probe_results"]:
                    results["probe_results"][probe_key] = {"passed": 0, "failed": 0}

                if passed:
                    results["probe_results"][probe_key]["passed"] += 1
                else:
                    results["probe_results"][probe_key]["failed"] += 1

    return results

if __name__ == "__main__":
    # Configuration
    model_type = "openai"
    model_name = "gpt-4"
    probes = "promptinject,dan,encoding,leakreplay"
    timestamp = datetime.now().strftime("%Y%m%d_%H%M%S")
    output_prefix = f"garak_baseline_{timestamp}"

    # Run scan
    jsonl_file = run_garak_scan(model_type, model_name, probes, output_prefix)

    # Parse results
    results = parse_garak_results(jsonl_file)

    # Save parsed results
    output_file = f"garak_baseline_results_{timestamp}.json"
    with open(output_file, "w") as f:
        json.dump(results, f, indent=2)

    print(f"[INFO] Garak results saved to {output_file}")
    print(f"[INFO] Pass rate: {results['passed_tests'] / results['total_tests']:.2%}")

