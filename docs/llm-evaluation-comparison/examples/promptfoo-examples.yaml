# =============================================================================
# USAGE NOTES
# =============================================================================
#
# 1. To run these examples:
#    - Save this file as promptfooconfig.yaml
#    - Run: promptfoo eval
#    - Or run specific section: promptfoo eval --config promptfooconfig.yaml
#
# 2. Environment variables:
#    - Set OPENAI_API_KEY for OpenAI models
#    - Set ANTHROPIC_API_KEY for Anthropic models
#    - Set ZHIPU_API_KEY for Zhipu AI models
#
# 3. Viewing results:
#    - Run: promptfoo view
#    - Or check output files in promptfoo_results/
#
# 4. Un-comment examples as needed:
#    - Each example is commented out with #
#    - Remove # to enable specific examples
#    - Keep only one example active at a time
#
# For more examples and detailed documentation, see:
# @src/promptfoo_evaluation/README.md
