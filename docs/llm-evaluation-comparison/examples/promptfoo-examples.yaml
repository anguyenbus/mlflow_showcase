# Promptfoo Configuration Examples
# This file contains working Promptfoo configurations for common evaluation scenarios

# =============================================================================
# EXAMPLE 1: Basic Prompt Testing
# =============================================================================

description: Basic prompt testing with model comparison
prompts:
  - "You are a helpful assistant. Answer the following: {{query}}"
  - "You are a concise assistant. Provide brief answers: {{query}}"

providers:
  - openai:gpt-4
  - openai:gpt-3.5-turbo
  - anthropic:messages:claude-3-sonnet-20240229

tests:
  - description: Basic factual question
    vars:
      query: "What is the capital of France?"
    assert:
      - type: icontains
        value: paris
      - type: llm-rubric
        value: "The answer correctly identifies Paris as the capital of France"

  - description: Calculation question
    vars:
      query: "What is 15 * 27?"
    assert:
      - type: icontains
        value: "405"
      - type: javascript
        value: "!output.includes(' ') || output.split(' ').length < 50"

