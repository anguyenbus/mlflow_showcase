# RAGas Configuration Examples
# This file contains working RAGas configurations for common RAG evaluation scenarios

# =============================================================================
# USAGE NOTES
# =============================================================================
#
# RAGas is a Python library that uses code-based configuration rather than YAML.
# These examples show Python code for common evaluation scenarios.
#
# To run these examples:
# 1. Install RAGas: pip install ragas
# 2. Set up API keys: export OPENAI_API_KEY=sk-...
# 3. Save example code to a Python file
# 4. Run: python example.py

# =============================================================================
# EXAMPLE 1: Basic RAG Evaluation
# =============================================================================

# """
# Basic RAG evaluation with core metrics
# """

from ragas import evaluate
from ragas.metrics import faithfulness, answer_relevancy

# Prepare your dataset
dataset = [
    {
        "question": "What is the capital of France?",
        "answer": "Paris is the capital of France.",
        "contexts": ["France is a country in Western Europe. Its capital is Paris."],
    }
]

# Run evaluation
result = evaluate(
    dataset=dataset,
    metrics=[faithfulness, answer_relevancy]
)

# View results
print(result)
# result.to_pandas()  # For DataFrame view

# =============================================================================
# EXAMPLE 2: Complete RAG Evaluation
# =============================================================================

# """
# Complete RAG evaluation with all core metrics
# """

from ragas import evaluate
from ragas.metrics import (
    faithfulness,
    answer_relevancy,
    context_precision,
    context_recall,
)

# Prepare dataset with ground truth
dataset = [
    {
        "question": "What is RAG?",
        "answer": "RAG stands for Retrieval-Augmented Generation, a technique that enhances LLMs with retrieved context.",
        "contexts": [
            "Retrieval-Augmented Generation (RAG) is an AI framework that retrieves relevant data.",
            "RAG enhances large language models by providing external knowledge."
        ],
        "ground_truth": "RAG is Retrieval-Augmented Generation, combining retrieval with generation.",
    }
]

# Run evaluation with all metrics
result = evaluate(
    dataset=dataset,
    metrics=[
        faithfulness,
        answer_relevancy,
        context_precision,
        context_recall,
    ]
)

print(result)

# =============================================================================
# EXAMPLE 3: Custom Evaluator LLM
# =============================================================================

# """
# Use a custom LLM backend for evaluation
# """

from ragas import evaluate
from ragas.metrics import Faithfulness
from ragas.llms import LangchainLLMWrapper
from langchain_openai import ChatOpenAI

# Configure evaluator LLM
evaluator_llm = LangchainLLMWrapper(
    ChatOpenAI(model="gpt-4o", temperature=0.1)  # Low temperature for consistency
)

# Create metric with custom backend
faithfulness = Faithfulness(llm=evaluator_llm)

# Run evaluation
dataset = [
    {
        "question": "What is the capital of France?",
        "answer": "Paris is the capital of France.",
        "contexts": ["France is a country. Its capital is Paris."],
    }
]

result = evaluate(
    dataset=dataset,
    metrics=[faithfulness]
)

print(result)

# =============================================================================
# EXAMPLE 4: Evaluation with Run Configuration
# =============================================================================

# """
# Configure evaluation run with custom settings
# """

from ragas import evaluate, RunConfig
from ragas.metrics import faithfulness, answer_relevancy

# Configure run settings
run_config = RunConfig(
    timeout=10,  # Timeout in seconds
    max_retries=3,  # Number of retries
    max_wait=60,  # Maximum wait time in seconds
)

dataset = [
    {
        "question": "What is the capital of France?",
        "answer": "Paris is the capital of France.",
        "contexts": ["France is a country. Its capital is Paris."],
    }
]

result = evaluate(
    dataset=dataset,
    metrics=[faithfulness, answer_relevancy],
    run_config=run_config
)

print(result)

