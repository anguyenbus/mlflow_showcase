            "Apple Computer was founded in April 1976 by Steve Jobs, Steve Wozniak, and Ronald Wayne.",
            "Steve Jobs and Steve Wozniak are known as the primary founders of Apple."
        ],
        "ground_truth": "Apple was founded by Steve Jobs, Steve Wozniak, and Ronald Wayne.",
