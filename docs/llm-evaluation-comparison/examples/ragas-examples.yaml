# =============================================================================
# EXAMPLE 8: MLflow Integration
# =============================================================================

# """
# Log RAGas evaluation to MLflow
# """

import mlflow
from ragas import evaluate
from ragas.metrics import faithfulness, answer_relevancy

# Start MLflow run
with mlflow.start_run():
    # Log parameters
    mlflow.log_params({
        "model": "gpt-4",
        "evaluator": "gpt-4",
        "metrics": "faithfulness,answer_relevancy"
    })

    # Run evaluation
    dataset = [
        {
            "question": "What is the capital of France?",
            "answer": "Paris is the capital of France.",
            "contexts": ["France is a country. Its capital is Paris."],
        }
    ]

    result = evaluate(
        dataset=dataset,
        metrics=[faithfulness, answer_relevancy]
    )

    # Log metrics
    result_dict = result.to_dict()
    for metric_name, metric_value in result_dict.items():
        mlflow.log_metric(metric_name, metric_value)

    print("Evaluation logged to MLflow")

# =============================================================================
# EXAMPLE 9: Custom Metric
# =============================================================================

# """
# Create a custom RAG evaluation metric
# """

from ragas.metrics import Metric
from typing import Any, Dict
from ragas.dataset_schema import SingleTurnSample

class CustomMetric(Metric):
    """Custom metric for evaluating answer length"""

    name = "answer_length"
    required_columns = ["answer"]

    def __init__(self, max_length: int = 100):
        self.max_length = max_length

    def score(self, row: SingleTurnSample) -> float:
        answer_length = len(row.answer)
        # Score is 1.0 if under max length, decreases linearly otherwise
        if answer_length <= self.max_length:
            return 1.0
        else:
            return max(0.0, 1.0 - (answer_length - self.max_length) / self.max_length)

# Use custom metric
from ragas import evaluate

dataset = [
    {
        "question": "What is the capital of France?",
        "answer": "Paris",
        "contexts": ["France is a country. Its capital is Paris."],
    }
]

result = evaluate(
    dataset=dataset,
    metrics=[CustomMetric(max_length=50)]
)

print(result)

