# =============================================================================
# METRIC REFERENCE
# =============================================================================

# | Metric | Requires Ground Truth | Description |
# |--------|---------------------|-------------|
# | faithfulness | No | Factual consistency with context |
# | answer_relevancy | No | How well answer addresses question |
# | context_precision | Yes | Relevance of retrieved context |
# | context_recall | Yes | Completeness of retrieved context |
# | context_entity_recall | Yes | Entity-level retrieval completeness |
# | answer_correctness | Yes | Factual accuracy vs ground truth |
# | answer_similarity | Yes | Semantic similarity to ground truth |

# =============================================================================
# SCORE INTERPRETATION
# =============================================================================

# Score ranges and interpretation:
# - 0.0 - 0.5: Poor - significant issues
# - 0.5 - 0.7: Fair - needs improvement
# - 0.7 - 0.9: Good - acceptable quality
# - 0.9 - 1.0: Excellent - high quality

# =============================================================================
# COMMON WORKFLOWS
# =============================================================================

# Workflow 1: Quick RAG Check (no ground truth)
# Use: faithfulness, answer_relevancy

# Workflow 2: Complete RAG Evaluation (with ground truth)
# Use: faithfulness, answer_relevancy, context_precision, context_recall

# Workflow 3: Retrieval System Evaluation
# Use: context_precision, context_recall, context_entity_recall

# Workflow 4: Generation Quality Evaluation
# Use: faithfulness, answer_relevancy, answer_correctness

