# =============================================================================
# SECURITY BEST PRACTICES
# =============================================================================

# 1. Never commit API keys to version control
# 2. Use environment variables for all credentials
# 3. Run security scans regularly (at least weekly)
# 4. Track results over time to identify regressions
# 5. Use report prefixes to organize scan results
# 6. Review failed probes carefully for false positives
# 7. Update Garak regularly to get latest probes
