# Temperature Optimization Sweep
#
# This evaluation tests the effect of temperature on LLM outputs across different
# task types. Temperature controls randomness: lower values are more deterministic,
# higher values are more creative and varied.
#
# Run with:
#   OPENAI_API_KEY=$ZHIPU_API_KEY npx promptfoo eval -c temperature_sweep.yaml
# Or use the Python runner:
#   python temperature_test.py

description: Temperature sweep to find optimal temperature for different tasks

prompts:
  - "{{task_description}}: {{prompt}}"

providers:
  - id: openai:chat:glm-5
    label: GLM-5 @ 0.0
    config:
      temperature: 0.0
      baseURL: https://open.bigmodel.cn/api/paas/v4/
  - id: openai:chat:glm-5
    label: GLM-5 @ 0.3
    config:
      temperature: 0.3
      baseURL: https://open.bigmodel.cn/api/paas/v4/
  - id: openai:chat:glm-5
    label: GLM-5 @ 0.7
    config:
      temperature: 0.7
      baseURL: https://open.bigmodel.cn/api/paas/v4/
  - id: openai:chat:glm-5
    label: GLM-5 @ 1.0
    config:
      temperature: 1.0
      baseURL: https://open.bigmodel.cn/api/paas/v4/

tests:
  # Test 1: Format compliance - lower temperatures should be more consistent
  - vars:
      task_description: "Answer in exactly this format: 'Answer: [your answer]'"
      prompt: "What is 5 + 3?"
    assert:
      - type: contains
        value: "Answer:"
      - type: contains
        value: "8"
    description: "Format compliance - low temp favored"

  # Test 2: Creative vocabulary - higher temperatures should be more creative
  - vars:
      task_description: "Write a one-sentence creative description of"
      prompt: "A sunset over the ocean"
    assert:
      - type: javascript
        value: |
          // Check for descriptive content (longer, more detailed)
          const hasColor = /red|orange|pink|purple|gold|yellow|blue|ocean|water|sun/i.test(output);
          const hasAction = /paint|shine|reflect|dance|glow|spread|fill|light|ray/i.test(output);
          const isDetailed = output.length > 30;
          return hasColor && (hasAction || isDetailed);
    description: "Creative vocabulary - high temp favored"

  # Test 3: Conciseness - lower temperatures should be more direct
  - vars:
      task_description: "Briefly answer"
      prompt: "What is the capital of France?"
    assert:
      - type: javascript
        value: |
          // Check if answer is concise and correct
          // Lower temps should be more concise, higher temps more verbose
          const hasParis = output.toLowerCase().includes('paris');
          // Count actual content chars (ignore reasoning sections if present)
          const lines = output.split('\n');
          let contentLines = [];
          let inReasoning = false;
          for (const line of lines) {
            if (line.includes('Thinking:') || line.trim().startsWith('*')) {
              inReasoning = true;
            } else if (line.includes('**Answer**') || line.includes('Answer:')) {
              inReasoning = false;
            }
            if (!inReasoning && line.trim().length > 0 && !line.includes('Thinking')) {
              contentLines.push(line);
            }
          }
          const contentLength = contentLines.join(' ').length;
          return hasParis && contentLength < 150;
    description: "Conciseness - low temp favored"

  # Test 4: Code syntax - lower temperatures should produce more reliable code
  - vars:
      task_description: "Write a Python function that"
      prompt: "Returns the sum of two numbers"
    assert:
      - type: contains
        value: "def"
      - type: contains
        value: "return"
    description: "Code syntax - low temp favored"

  # Test 5: Creativity variety - higher temps should be more varied
  - vars:
      task_description: "Name this coffee drink:"
      prompt: "A chocolate-orange espresso"
    assert:
      - type: contains
        value: "Orange"
      - type: icontains
        value: "mocha"
    description: "Creative naming - high temp favored"

  # Test 6: Factual accuracy - lower temperatures should be more accurate
  - vars:
      task_description: "What year did"
      prompt: "World War II end?"
    assert:
      - type: contains
        value: "1945"
    description: "Factual accuracy - low temp favored"

  # Test 7: Divergent thinking - higher temps should generate more ideas
  - vars:
      task_description: "List uses for"
      prompt: "A brick"
    assert:
      - type: contains
        value: "build"
    description: "Divergent thinking - higher temp favored"

  # Test 8: Word repetition check - higher temps might ramble
  - vars:
      task_description: "Explain briefly"
      prompt: "Why is the sky blue?"
    assert:
      - type: contains
        value: "blue"
    description: "Brief explanation - all temps should pass"

  # Test 9: Translation consistency - lower temps should be more consistent
  - vars:
      task_description: "Translate to French"
      prompt: "Hello, how are you?"
    assert:
      - type: contains
        value: "Bonjour"
    description: "Translation - low temp favored"

  # Test 10: Storytelling creativity - higher temps should be more creative
  - vars:
      task_description: "Write a one-sentence story about"
      prompt: "A cat who learned to fly"
    assert:
      - type: javascript
        value: |
          // Check for story elements (just needs cat and some flying reference)
          // Handle verbose reasoning outputs
          const hasCat = /cat|kitten|feline|mittens|whiskers|barnaby|felix/i.test(output);
          const hasFly = /fly|flew|soar|wing|sky|air|float|gravity/i.test(output);
          // Be more lenient on length since models include reasoning
          const hasContent = output.length > 50;
          return hasCat && hasFly && hasContent;
    description: "Story creativity - high temp favored"

outputPath: /home/an/projects/tracing_project/promptfoo_results/temperature_sweep.json

# Enable sharing of results for comparison
sharing: true
